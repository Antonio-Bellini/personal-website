<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/af19d86422.js" crossorigin="anonymous"></script>
    <script src="./assets/js/profilePic.js"></script>
    <link rel="stylesheet" href="./assets/style/css/main.css">
    <link rel="icon"       href="./assets/img/home_page.png" type="x-icon">
    <title>Homepage</title>
</head>

<body onload="profile()">
    <section>
        <div class="sub_block">
            <!--Bottoni delle pagine in alto-->
            <nav>
                <div class="links" id="navLinks">
                    <i class="fa-solid fa-close" onclick="hideMenu()"></i>
                    <ul>
                        <li><a href="index.html"         class="button button--sel">HOME    </a></li>
                        <li><a href="about_page.html"    class="button">            ABOUT   </a></li>
                        <li><a href="projects_page.html" class="button">            PROJECTS</a></li>
                        <li><a href="skills_page.html"   class="button">            SKILLS  </a></li>
                        <li><a href="contact_page.html"  class="button">            CONTACT </a></li>
                    </ul>
                </div>
                <i class="fa-solid fa-bars" onclick="showMenu()"></i>
            </nav>
            
            <div class="main">
                <img src="./assets/img/profile_picture.png" class="img_profile" alt="immagine del profilo">

                <!--Testo principale-->
                <div class="main--home">
                    <h1>I am <span>Antonio Bellini</span></h1>
                    <p>
                        Welcome to my personal portfolio website where I share all my projects, my skills and also my contacts.
                    </p>
                    <a href="contact_page.html" class="button--contact">Contact me &nbsp;<i class="fa fa-paper-plane"></i></a>
                </div>
            </div>

            <!--Footer della home-->
            <div class="footer">
                <p>CC by Antonio Bellini &copy;</p>
                <br/>
                <br/>
            </div>
        </div>
    </section>


    <!--Menu da mobile-->
    <script>
        var links = document.getElementById("navLinks");
        // Nasconde il menu
        function hideMenu() {
            links.style.right = "-200px";
        }
        // Mostra il menu
        function showMenu() {
            links.style.right = "0";
        }
    </script>
</body>
</html>
